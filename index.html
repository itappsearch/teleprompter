<div id="setup-screen">
    <h1 style="letter-spacing:5px">PROMPTR</h1>
    <textarea id="text-input" placeholder="Enter text here..."></textarea>
    
    <div class="controls-container">
        <div class="control-segment" id="speed-options">
            <div class="icon"><i class="fas fa-tachometer-alt"></i></div>
            <button class="opt" data-speed="1">1</button>
            <button class="opt" data-speed="2">2</button>
            <button class="opt selected" data-speed="3">3</button>
            <button class="opt" data-speed="4">4</button>
            <button class="opt" data-speed="5">5</button>
        </div>

        <div class="control-segment" id="align-options">
            <div class="icon"><i class="fas fa-align-left"></i></div>
            <button class="opt selected" data-align="left">Left</button>
            <button class="opt" data-align="center">Center</button>
            <button class="opt" data-align="right">Right</button>
        </div>

        <div class="control-segment" id="mirror-btn" style="cursor:pointer">
            <div class="icon"><i class="fas fa-sync"></i></div>
            <span class="opt" id="mirror-text">Normal</span>
        </div>

        <button id="start-btn" class="start-btn">Start</button>
    </div>
</div>

<div id="prompter-screen" class="hidden">
    <div class="reading-line"></div>
    <div id="prompter-text"></div>
</div>
