<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Prompter Pro - Studio Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="setup-screen">
        <h1 class="logo-text">PROMPTR<span class="dot">.</span>TV</h1>
        <textarea id="text-input" placeholder="Enter your text here..."></textarea>
        
        <div class="controls-container">
            <div class="control-segment speed-selector">
                <i class="fa-solid fa-arrows-spin icon"></i> <div class="options" id="speed-options">
                    <button class="opt" data-speed="1">1</button>
                    <button class="opt" data-speed="2">2</button>
                    <button class="opt selected" data-speed="3">3</button> <button class="opt" data-speed="4">4</button>
                    <button class="opt" data-speed="5">5</button>
                    <button class="opt" data-speed="6">6</button>
                    <button class="opt" data-speed="7">7</button>
                    <button class="opt" data-speed="8">8</button>
                    <button class="opt" data-speed="9">9</button>
                    <button class="opt" data-speed="10">10</button>
                </div>
            </div>

            <div class="control-segment alignment-selector">
                <i class="fa-solid fa-align-left icon"></i>
                <div class="options" id="align-options">
                    <button class="opt selected" data-align="left">Left</button>
                    <button class="opt" data-align="center">Center</button>
                    <button class="opt" data-align="right">Right</button>
                </div>
            </div>

            <div class="control-segment mirror-toggle" id="mirror-btn">
                <i class="fa-solid fa-arrows-alt-h icon"></i>
                <div class="options">
                    <span id="mirror-text" class="opt normal">Normal</span>
                </div>
            </div>

            <button id="start-btn" class="start-btn">Start</button>
        </div>
    </div>

    <div id="prompter-screen" class="hidden">
        <div class="reading-line"></div>
        <div id="scroll-container">
            <div id="prompter-text"></div>
        </div>
        <div class="tv-controls">
            <p><b>SPACE</b> Play/Pause | <b>ESC</b> Exit</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
